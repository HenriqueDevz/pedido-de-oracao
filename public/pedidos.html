<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos os Pedidos - Pedido de Oração</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 800px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <h1>Todos os Pedidos</h1>
            <a href="/logout" style="
        background-color: #6e450f;
        color: white;
        padding: 8px 14px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 13px;
        font-family: 'Cinzel', serif;
    ">Sair</a>
</div>

<nav style="
          display: flex;
          gap: 10px;
          margin-bottom: 24px;
          border-bottom: 1px solid #d4a85a;
          padding-bottom: 16px;
">
    <a href="/index.html" style="
        flex: 1;
        text-align: center;
        padding: 10px;
        background-color:#6e450f;
        color: white;
        border-radius: 8px;
        text-decoration: none;
        font-family: 'Cinzel', serif;
        font-size: 13px;
    ">Novo Pedido</a>"
    <a href="/pedidos.html" style="
        flex: 1;
        text-align: center;
        padding: 10px;
        background-color: white;
        color: #6e450f;
        border-radius: 8px;
        text-decoration: none;
        font-family: 'Cinzel', serif;
        font-size: 13px;
        border: 1.5px solid #6e450f;
    ">Todos os Pedidos</a>"
</nav>
<h2>Todos os Pedidos</h2>
    <div style="overflow-x: auto;">
        <table id ="tabelaPedidos" style="    
            whidth: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 14px;
">
        <thead>
            <tr style="background-color: #6e450f; color: white;">
                <th style="padding: 12px; text-align: left;">#</th>
                <th style="padding: 12px; text-align: left;">Nome</th>
                <th style="padding: 12px; text-align: left;">Pedido</th>
                <th style="padding: 12px; text-align: left;">Data</th>
                <th style="padding: 12px; text-align: left;">Ação</th>
            </tr>"
        </thead>
         <tbody id="corpoTabela">
         </tbody>
    </table>
  </div>
  <p id="semPedidos" style="text-align: center; color: #999; margin-top: 20px; display: none;">
        Nenhum pedido de oração encontrado.
  </p>
</div>
<script src="script-pedidos.js"></script>
</body>
</html>
